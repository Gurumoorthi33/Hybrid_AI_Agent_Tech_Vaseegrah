name: Build → ECR → Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger

env:
  AWS_REGION:    ap-south-1          # Mumbai — closest to Tamil Nadu
  ECR_REPO:      yowhats-backend
  EC2_USER:      ec2-user
  DEPLOY_DIR:    /home/ec2-user/yowhats

jobs:

  # ── 1. Build & push Docker image to ECR ─────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ steps.meta.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Pushed $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

  # ── 2. Deploy to EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code (for compose files)
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ env.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      "docker-compose.yml,docker-compose.prod.yml,deploy/"
          target:      ${{ env.DEPLOY_DIR }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO:     ${{ env.ECR_REPO }}
          IMAGE_TAG:    ${{ needs.build-and-push.outputs.image_tag }}
          AWS_REGION:   ${{ env.AWS_REGION }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     ECR_REGISTRY,ECR_REPO,IMAGE_TAG,AWS_REGION
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # Export vars for compose
            export ECR_REGISTRY=$ECR_REGISTRY
            export ECR_REPO=$ECR_REPO
            export IMAGE_TAG=$IMAGE_TAG

            # Pull new image
            docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

            # Rolling restart — zero downtime
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --no-deps backend

            # Clean up old images
            docker image prune -f

            echo "✅ Deployed $IMAGE_TAG"
