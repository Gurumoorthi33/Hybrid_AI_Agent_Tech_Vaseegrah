version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Production override — used on EC2 with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────

services:

  backend:
    image: ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG:-latest}
    # Override: pull from ECR instead of local build
    build: !reset null
    environment:
      - PYTHONUNBUFFERED=1
      # Secrets injected from AWS Secrets Manager via ECS / EC2 user-data
      # Or set via SSM Parameter Store + env injection script
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      # On EC2: mount EFS for persistent RAG data
      - /mnt/efs/rag_data:/app/data

  nginx:
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs via Certbot
      - /etc/letsencrypt:/etc/nginx/certs:ro
      - /var/www/certbot:/var/www/certbot:ro
