# ─────────────────────────────────────────────────────────────────
# Replace YOUR_DOMAIN with your actual domain e.g. api.yowhats.com
# SSL certs provided by Let's Encrypt (see deploy guide)
# ─────────────────────────────────────────────────────────────────

# Upstream — FastAPI backend
upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/nginx/certs/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Dashboard — internal access only ─────────────────────────
    # Block public access to the admin dashboard
    location /dashboard {
        # Allow only your IP / office IP
        # Replace with your actual office/home IP:
        allow YOUR_ADMIN_IP;
        deny  all;
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes — public (auth enforced by FastAPI) ────────────
    location / {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long AI responses
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # WebSocket support (for future streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
