version: "3.9"

# ─────────────────────────────────────────────────────────────────
# YoWhats Agent — Local Docker Compose Stack
#
# Services:
#   backend  — FastAPI app (port 8000)
#   nginx    — Reverse proxy + SSL termination (ports 80 / 443)
#
# MongoDB is external (Atlas) — not run locally.
#
# Usage:
#   cp .env.example .env           # fill in your secrets
#   docker compose up --build -d   # start
#   docker compose logs -f         # watch logs
#   docker compose down            # stop
# ─────────────────────────────────────────────────────────────────

services:

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: yowhats-backend
    restart: unless-stopped
    env_file: .env                 # all secrets injected here
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "8000:8000"               # exposed for direct access in dev
    volumes:
      # RAG data persisted outside container
      - rag_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx reverse proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: yowhats-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certs — replace with real certs for production
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  rag_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge
